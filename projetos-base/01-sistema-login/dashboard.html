<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Área Restrita</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
    // Se não estiver autenticado, chuta de volta para o login
    if (localStorage.getItem('isAuthenticated') !== 'true') {
        window.location.href = 'index.html';
    }
</script>

<div class="navbar">
    <h2>Sistema Interno</h2>
    <button class="btn btn-logout" onclick="logout()">Sair (Logout)</button>
</div>

<div class="container">
    <h1>Bem-vindo, <span id="userName">Usuário</span>!</h1>
    
    <div class="card">
        <h3>Seus Dados de Sessão</h3>
        <p><strong>Nível de Acesso:</strong> <span id="userRole" class="badge">Carregando...</span></p>
        <p>A autenticação foi realizada com sucesso e o token JWT foi gerado.</p>
    </div>

    <!-- Painel Admin Atualizado com a Tabela -->
    <div class="card" id="adminPanel" style="display: none; border-left: 4px solid #166534;">
        <h3>Painel Exclusivo de Administração</h3>
        <p>Acesso liberado apenas para perfis administradores.</p>
        <button class="btn" style="background: #166534; width: auto;" onclick="loadUsers()">Gerenciar Usuários</button>
        
        <!-- Área onde a lista de usuários vai aparecer -->
        <div id="usersContainer" style="display: none; margin-top: 20px;">
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin-bottom: 15px;">
            <h4>Lista de Usuários Cadastrados</h4>
            <table style="width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px;">
                <thead>
                    <tr style="background-color: #f8fafc; text-align: left;">
                        <th style="padding: 10px; border-bottom: 2px solid #cbd5e1;">Nome</th>
                        <th style="padding: 10px; border-bottom: 2px solid #cbd5e1;">E-mail</th>
                        <th style="padding: 10px; border-bottom: 2px solid #cbd5e1;">Perfil</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Os usuários serão injetados aqui via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const userData = JSON.parse(localStorage.getItem('currentUser'));
    const token = localStorage.getItem('token');
    
    if (userData) {
        document.getElementById('userName').textContent = userData.name;
        const roleSpan = document.getElementById('userRole');
        roleSpan.textContent = userData.role.toUpperCase();
        
        if (userData.role === 'admin') {
            roleSpan.classList.add('admin');
            document.getElementById('adminPanel').style.display = 'block';
        }
    }

    async function loadUsers() {
        try {
            // Mudando o texto do botão para dar feedback visual
            const btn = document.querySelector('#adminPanel button');
            btn.textContent = "Carregando...";
            
            const response = await fetch('https://api-qa-fap2026.onrender.com/api/users', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            
            if(response.ok) {
                const users = await response.json();
                
                // Exibe o container da tabela
                document.getElementById('usersContainer').style.display = 'block';
                const tbody = document.getElementById('usersTableBody');
                
                // Limpa a tabela antes de preencher para não duplicar se clicar duas vezes
                tbody.innerHTML = ""; 
                
                // Desenha cada linha da tabela
                users.forEach(user => {
                    const row = document.createElement('tr');
                    
                    // Lógica para deixar o badge verdinho se for admin
                    const badgeClass = user.role === 'admin' ? 'badge admin' : 'badge';
                    
                    row.innerHTML = `
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; color: #334155;">${user.name}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0; color: #64748b;">${user.email}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #e2e8f0;">
                            <span class="${badgeClass}">${user.role.toUpperCase()}</span>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                
                btn.textContent = "Atualizar Lista"; // Volta o botão ao normal
                
            } else {
                const error = await response.json();
                alert("Erro ao buscar usuários: " + error.error);
                btn.textContent = "Gerenciar Usuários";
            }
        } catch (e) {
            alert("Erro de comunicação com a API.");
            document.querySelector('#adminPanel button').textContent = "Gerenciar Usuários";
        }
    }

    function logout() {
        localStorage.removeItem('isAuthenticated');
        localStorage.removeItem('currentUser');
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
